services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app

  api:
    build:
      context: ./api-server
      secrets:
        - envfile
    env_file:
      - api-server/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/chatapp
      MODEL_NAME: HuggingFaceTB/SmolLM2-1.7B-Instruct
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model-cache:/root/.cache/huggingface
    networks:
      - app

  web:
    build:
      context: ./web-app
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  pgdata:
  model-cache:

secrets:
  envfile:
    file: api-server/.env
